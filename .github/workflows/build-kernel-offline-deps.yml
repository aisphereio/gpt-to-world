name: build-kernel-offline-deps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: Build Go proxy overlay for missing layout deps
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p /tmp/kernel-offline-build/gomod
          cd /tmp/kernel-offline-build/gomod

          cat > go.mod <<'EOF'
          module kernel-offline-missing-deps

          go 1.25.0

          require go.einride.tech/aip v0.86.3
          EOF

          cat > main.go <<'EOF'
          package main

          import (
              _ "go.einride.tech/aip/fieldmask"
              _ "go.einride.tech/aip/filtering"
              _ "go.einride.tech/aip/ordering"
              _ "go.einride.tech/aip/pagination"
          )

          func main() {}
          EOF

          go mod tidy
          go mod download all

          mkdir -p /tmp/kernel-offline-artifact/goproxy-overlay
          cp -a "$(go env GOPATH)/pkg/mod/cache/download/." /tmp/kernel-offline-artifact/goproxy-overlay/
          find /tmp/kernel-offline-artifact/goproxy-overlay -name '*.lock' -delete

      - name: Build Buf remote module cache
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp/kernel-offline-build

          curl -fsSL -o buf.tgz https://github.com/bufbuild/buf/releases/download/v1.71.0/buf-Linux-x86_64.tar.gz
          mkdir -p buf-bin
          tar -xzf buf.tgz -C buf-bin --strip-components=1
          install -m 0755 buf-bin/bin/buf /usr/local/bin/buf

          export XDG_CACHE_HOME=/tmp/kernel-offline-build/xdg-cache
          mkdir -p proto-root/dummy/v1
          cd proto-root

          cat > buf.yaml <<'EOF'
          version: v2
          modules:
            - path: .
          deps:
            - buf.build/googleapis/googleapis
            - buf.build/grpc-ecosystem/grpc-gateway
            - buf.build/bufbuild/protovalidate
          lint:
            use:
              - STANDARD
          EOF

          cat > dummy/v1/dummy.proto <<'EOF'
          syntax = "proto3";

          package dummy.v1;

          import "buf/validate/validate.proto";
          import "google/api/annotations.proto";
          import "protoc-gen-openapiv2/options/annotations.proto";

          option go_package = "example.com/dummy/v1;dummyv1";

          option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
            info: {
              title: "Dummy API"
              version: "v1"
            }
          };

          service DummyService {
            rpc GetDummy(GetDummyRequest) returns (GetDummyResponse) {
              option (google.api.http) = {
                get: "/v1/dummy/{id}"
              };
            }
          }

          message GetDummyRequest {
            string id = 1 [(buf.validate.field).string.min_len = 1];
          }

          message GetDummyResponse {
            string id = 1;
          }
          EOF

          buf dep update
          buf lint
          buf build -o /tmp/kernel-offline-artifact/buf-cache-smoke.bin

          mkdir -p /tmp/kernel-offline-artifact/buf-cache
          cp -a "$XDG_CACHE_HOME/buf/." /tmp/kernel-offline-artifact/buf-cache/
          cp -a buf.lock /tmp/kernel-offline-artifact/buf.lock

      - name: Add apply script and manifest
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp/kernel-offline-artifact

          cat > apply-kernel-offline-deps.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          ROOT="${1:-/mnt/data/kernel-offline}"
          BIN_ROOT="${2:-/opt/apply_patch}"
          BUF_CACHE_TARGET="${BUF_CACHE_TARGET:-/mnt/data/buf-cache}"

          if [ ! -d "$ROOT/goproxy" ]; then
            echo "missing kernel offline goproxy: $ROOT/goproxy" >&2
            exit 1
          fi

          mkdir -p "$ROOT/goproxy" "$BUF_CACHE_TARGET"
          cp -a goproxy-overlay/. "$ROOT/goproxy/"
          cp -a buf-cache/. "$BUF_CACHE_TARGET/"

          cat > /mnt/data/kernel-offline-env.sh <<ENVEOF
          export GOROOT=/mnt/data/go1.26.4
          export GOPROXY=file://$ROOT/goproxy,off
          export GOSUMDB=off
          export PROTOC_INCLUDE=$BIN_ROOT/include
          export BUF_CACHE_DIR=$BUF_CACHE_TARGET
          export XDG_CACHE_HOME=/mnt/data
          export PATH=$BIN_ROOT/bin:\$GOROOT/bin:\$PATH
          ENVEOF

          echo "applied kernel offline deps"
          echo "source /mnt/data/kernel-offline-env.sh"
          EOF

          chmod +x apply-kernel-offline-deps.sh

          cat > MANIFEST.txt <<'EOF'
          kernel GitHub Actions offline deps artifact

          Contents:
          - goproxy-overlay/: Go module proxy overlay, currently includes go.einride.tech/aip@v0.86.3 and transitive module cache entries.
          - buf-cache/: Buf remote module cache for googleapis, grpc-gateway, protovalidate.
          - buf.lock: lock generated from the declared deps.
          - buf-cache-smoke.bin: descriptor build output proving the cached Buf deps are usable.
          - apply-kernel-offline-deps.sh: merges the overlay into /mnt/data/kernel-offline and writes /mnt/data/kernel-offline-env.sh.
          EOF

          tar -czf /tmp/kernel-offline-deps-overlay.tgz .
          ls -lh /tmp/kernel-offline-deps-overlay.tgz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-offline-deps-overlay
          path: /tmp/kernel-offline-deps-overlay.tgz
          if-no-files-found: error
          retention-days: 7
